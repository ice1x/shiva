# Shiva PR Review Agent — review category configuration.
#
# This file is the default configuration and the reference schema. A target
# repository overrides it by placing its own `.shiva.yml` at the repo root
# (task 00014); repo config is merged over these defaults by category `id` — a
# matching id overrides only the fields it lists, a new id adds a category. See
# the "Per-repo configuration" section of README.md.
#
# Each category:
#   id:      unique slug, used for merging/overriding
#   name:    human-readable name, used in review output headings
#   enabled: whether the category is included in the review prompt
#   prompt:  instruction block injected into the LLM review prompt
#
# Custom categories are first-class: add a new entry with your own id/name/
# prompt (see the commented example at the bottom).

version: 1

# Which LLM performs the review (task 00019/00020). The review step is
# vendor-agnostic: pick any provider, or point it at any OpenAI-/Anthropic-
# compatible endpoint. The DEFAULT is a free, local, keyless model (Ollama) on
# purpose — a fresh clone costs nothing and locks in no vendor. A target repo's
# `.shiva.yml` `llm` block REPLACES this one wholesale (override wins).
#
# Known providers (endpoint + default model + auth are built in):
#   ollama, lmstudio, vllm   — local, no API key (free)
#   openrouter               — free & paid models (Bearer key)
#   openai, deepseek, qwen   — hosted (Bearer key)
#   anthropic                — hosted (x-api-key)
#
# Fields (all optional):
#   provider: one of the above; omit to use the default (ollama)
#   model:    overrides the provider's default model
#   endpoint: overrides the provider's default URL
#   api:      wire protocol — openai | anthropic (only for a custom provider)
#   auth:     none | bearer | x-api-key (only for a custom provider)
#
# Custom / self-hosted endpoint (no preset needed — truly vendor-agnostic):
#   llm:
#     api: openai
#     endpoint: https://llm.mycorp.internal/v1/chat/completions
#     model: my-model
#     auth: bearer
#
# Credentials are attached in the n8n UI on the 'LLM Review' node (task 00002):
# 'Authorization: Bearer <key>' for OpenAI/DeepSeek/Qwen/OpenRouter,
# 'x-api-key: <key>' for Anthropic; the local providers need none.
#
# NOTE: the local endpoints use host.docker.internal so the dockerised n8n can
# reach a model server on the host (see docker-compose.yml). A natively-run n8n
# should override `endpoint` to use localhost.
llm:
  provider: ollama            # DEFAULT for every repo not listed below
  temperature: 0              # 0 = deterministic, terse, on-topic (0–2)

# Per-repo model mapping: the default `llm` above applies to every repo except
# those named here, which use their own block instead (same fields as `llm`).
# Because n8n bakes the provider into the workflow, build a repo's workflow with
# `build_workflow.py --repo owner/name` to pick it up. A hosted provider needs an
# API key as an n8n credential (the E2E driver reads it by provider, e.g.
# $SHIVA_OPENAI_API_KEY, else $SHIVA_LLM_API_KEY), and `e2e.py check` fails until
# it is set — so the mapping ships EMPTY to keep a fresh clone free and keyless.
# Each key is a GitHub "owner/repo"; its block has the same fields as `llm`
# above (provider / model / temperature / endpoint / auth). Add a repo here to
# route it to a different model than the default; leave it out to use the
# default. Build that repo's workflow with `build_workflow.py --repo owner/name`.
llm_by_repo:
  ice1x/graphbook:            # this repo reviews with a hosted model...
    provider: openai
    model: gpt-4o
    temperature: 0
  # ice1x/antigram:           # ...another could use a different vendor:
  #   provider: deepseek
  #   model: deepseek-chat
  # everyone else falls back to the default `llm` (ollama) above.

# Free-form house rules injected into the review prompt (task 00012). Leave
# empty in the defaults; a target repo sets its own in `.shiva.yml` and it is
# merged over this value (override wins). Example:
#   conventions: |
#     Prefer pure functions; keep side effects at the edges.
#     Never log secrets or PII. Public APIs need docstrings.
conventions: ""

# Files skipped before review (task 00017). Generated, vendored, and lock files
# carry a diff but are not worth a paid LLM review, so any file whose path
# matches one of these globs is dropped by `filter_files`. Each glob is matched
# against both the full repository-relative path and the bare basename (fnmatch
# semantics), so `package-lock.json` matches at any depth while `*/dist/*`
# targets a directory. A target repo's `.shiva.yml` `exclude` list REPLACES
# these defaults wholesale (override wins), so copy the ones you still want.
exclude:
  - "*.lock"                # poetry.lock, Cargo.lock, yarn.lock, Gemfile.lock, ...
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "*.min.js"
  - "*.min.css"
  - "*.map"                 # source maps
  - "*.pb.go"               # generated protobuf
  - "*_pb2.py"              # generated protobuf (python)
  - "*.generated.*"
  - "*/node_modules/*"
  - "*/vendor/*"
  - "*/dist/*"
  - "*/build/*"

categories:
  - id: structural
    name: Structural Review
    enabled: true
    prompt: >
      Focus on the architecture and design of the code. Ensure that the code
      is organized logically and follows best practices for structure.

  - id: logical
    name: Logical Review
    enabled: true
    prompt: >
      Examine the logic and algorithms used in the code. Check for
      correctness and efficiency of the implemented logic.

  - id: behavioral
    name: Behavioral Review
    enabled: true
    prompt: >
      Look at how the code behaves in different scenarios. Ensure that the
      code meets the functional requirements and handles edge cases properly.

  - id: security
    name: Security Review
    enabled: true
    prompt: >
      Examine the code for potential security vulnerabilities. Ensure that
      the code follows best practices for security and data protection.

  - id: performance
    name: Performance Review
    enabled: true
    prompt: >
      Analyze the code for performance issues. Ensure that the code is
      optimized for speed and resource usage.

  - id: code-style
    name: Code Style Review
    enabled: false
    prompt: >
      Ensure that the code adheres to the project's coding standards and
      style guidelines. Check for consistency in naming conventions,
      indentation, and formatting.

  - id: docstrings-comments
    name: Docstrings and Comments Review
    enabled: false
    prompt: >
      Review the documentation within the code, such as docstrings and
      comments. Ensure that the code is well-documented and that comments
      are clear and helpful.

  - id: messages
    name: Messages Review
    enabled: false
    prompt: >
      Focus on the clarity and helpfulness of messages, such as error
      messages and log outputs. Ensure that messages are informative and
      aid in debugging and understanding the code.

  - id: test-coverage
    name: Test Coverage Review
    enabled: false
    prompt: >
      Review the tests associated with the code. Ensure that the code is
      adequately tested and that tests cover various scenarios and edge
      cases.

  # Custom category example — uncomment and adapt:
  # - id: i18n
  #   name: Internationalization Review
  #   enabled: true
  #   prompt: >
  #     Check that all user-facing strings go through the translation layer
  #     and no hardcoded locale-specific formatting is introduced.
