name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Check generated workflow is up to date
        run: |
          python scripts/build_workflow.py
          git diff --exit-code workflows/pr_review.json \
            || { echo "::error::workflows/pr_review.json is stale — regenerate with 'python scripts/build_workflow.py' and commit the result"; exit 1; }
