# Shiva reviewing its own pull requests, using the action from this checkout.
# This is also the reference for what a target repo copies in — see
# docs/github-action.md.
name: Shiva Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      # Read into env so the step below can test for its presence: the `secrets`
      # context is not available in a job-level `if:`.
      LLM_KEY: ${{ secrets.SHIVA_LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Review with Shiva
        if: env.LLM_KEY != ''
        uses: ./
        with:
          llm-api-key: ${{ secrets.SHIVA_LLM_API_KEY }}

      - name: Explain the skip
        if: env.LLM_KEY == ''
        run: |
          echo "::notice::SHIVA_LLM_API_KEY is not set — skipping the review." \
               "Add the secret to enable Shiva on this repository."
