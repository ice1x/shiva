services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    container_name: shiva-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - TZ=${GENERIC_TIMEZONE:-UTC}
      # Webhook URL used by trigger nodes; override with a tunnel URL
      # (e.g. ngrok) when receiving real GitHub webhooks.
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_DIAGNOSTICS_ENABLED=false
      # Code nodes (JS + Python) run in an external task-runner sidecar; the
      # stock n8n image ships no Python, so internal mode cannot run the
      # workflow's Python Code nodes.
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:-shiva-local-runners-token}
      - N8N_NATIVE_PYTHON_RUNNER=true
    volumes:
      - n8n_data:/home/node/.n8n
    # Lets the review's HTTP node reach a model server running on the host
    # (default LLM provider is a local Ollama at host.docker.internal:11434,
    # task 00020). host-gateway makes host.docker.internal resolve on Linux too,
    # matching Docker Desktop on macOS/Windows.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Task-runner sidecar executing Code-node scripts. Its version must match
  # the n8n image; both read the same N8N_VERSION so pinning is atomic.
  n8n-runners:
    image: n8nio/runners:${N8N_VERSION:-latest}
    container_name: shiva-n8n-runners
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:-shiva-local-runners-token}
    depends_on:
      - n8n

volumes:
  n8n_data:
